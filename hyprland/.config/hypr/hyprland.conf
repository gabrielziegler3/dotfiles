# ╔══════════════════════════════════════════════════════════════════╗
# ║  Hyprland config — mirrors i3 setup                            ║
# ╚══════════════════════════════════════════════════════════════════╝

# ── Environment variables ────────────────────────────────────────
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland

# ── Monitor ──────────────────────────────────────────────────────
# Mirrors: xrandr --output DisplayPort-1 --mode 2560x1440 --rate 155
monitor = DP-1, 2560x1440@155, 0x0, 1
monitor = , preferred, auto, 1

# ── Keyboard & Input ─────────────────────────────────────────────
input {
    kb_layout = us, us
    kb_variant = , intl
    # Mirrors: xset r rate 280 70
    repeat_rate = 70
    repeat_delay = 280
    follow_mouse = 0    # Mirrors: focus_follows_mouse no
    sensitivity = 0
}

# ── General ──────────────────────────────────────────────────────
general {
    # Mirrors: gaps inner 10 / gaps outer -2
    gaps_in = 5
    gaps_out = 8
    border_size = 3
    # Animated gradient border — Tokyo Night accent colors
    col.active_border = rgba(7aa2f7ff) rgba(bb9af7ff) 45deg
    col.inactive_border = rgba(1a1b2600)
    layout = dwindle
}

# Smart gaps: no gaps when only one window
workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

# ── Decoration ───────────────────────────────────────────────────
decoration {
    # Mirrors: picom corner-radius 10
    rounding = 10

    # Transparency — active windows slightly transparent, inactive more so
    active_opacity = 0.95
    inactive_opacity = 0.88

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true
        # Blur behind waybar, rofi, and notifications
        xray = false
        popups = true
    }

    # Mirrors: picom shadow settings
    shadow {
        enabled = true
        range = 5
        offset = 1 1
        render_power = 3
        color = rgba(00000099)
    }
}

# ── Animations ───────────────────────────────────────────────────
animations {
    enabled = true

    bezier = ease, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 2, ease, popin 80%
    animation = windowsOut, 1, 2, ease, popin 80%
    animation = fade, 1, 2, ease
    animation = workspaces, 1, 2, ease, fade
    animation = border, 1, 4, ease
    animation = borderangle, 1, 30, ease, loop    # rotating gradient border
}

# ── Layout ───────────────────────────────────────────────────────
dwindle {
    pseudotile = true
    preserve_split = true
}

# ── Window groups styling ────────────────────────────────────────
group {
    col.border_active = rgba(7aa2f7ff)
    col.border_inactive = rgba(565f8966)

    groupbar {
        font_size = 11
        col.active = rgba(7aa2f7ff)
        col.inactive = rgba(1a1b26ff)
    }
}

# ── Misc ─────────────────────────────────────────────────────────
misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# ── Variables ────────────────────────────────────────────────────
$mod = ALT
$terminal = kitty
$menu = rofi -show drun -show-icons
$wallpaper_folder = $HOME/Pictures/Wallpapers

# ══════════════════════════════════════════════════════════════════
#  KEYBINDINGS — mirrors i3 config
# ══════════════════════════════════════════════════════════════════

# ── Launch ───────────────────────────────────────────────────────
# Mirrors: bindsym $mod+Return exec kitty
bind = $mod, Return, exec, $terminal
# Mirrors: bindsym $mod+d exec --no-startup-id rofi -show run
bind = $mod, d, exec, $menu
# Mirrors: bindsym $mod+Shift+q kill
bind = $mod SHIFT, q, killactive

# ── Focus (vim keys) ─────────────────────────────────────────────
# Mirrors: bindsym $mod+h/j/k/l focus left/down/up/right
bind = $mod, h, movefocus, l
bind = $mod, j, movefocus, d
bind = $mod, k, movefocus, u
bind = $mod, l, movefocus, r
# Arrow keys
bind = $mod, Left, movefocus, l
bind = $mod, Down, movefocus, d
bind = $mod, Up, movefocus, u
bind = $mod, Right, movefocus, r

# ── Move windows ─────────────────────────────────────────────────
# Mirrors: bindsym $mod+Shift+h/j/k/l move left/down/up/right
bind = $mod SHIFT, h, movewindow, l
bind = $mod SHIFT, j, movewindow, d
bind = $mod SHIFT, k, movewindow, u
bind = $mod SHIFT, l, movewindow, r
# Arrow keys
bind = $mod SHIFT, Left, movewindow, l
bind = $mod SHIFT, Down, movewindow, d
bind = $mod SHIFT, Up, movewindow, u
bind = $mod SHIFT, Right, movewindow, r

# ── Resize ───────────────────────────────────────────────────────
# Mirrors: bindsym $mod+Ctrl+h/j/k/l resize
binde = $mod CTRL, h, resizeactive, 20 0
binde = $mod CTRL, j, resizeactive, 0 20
binde = $mod CTRL, k, resizeactive, 0 -20
binde = $mod CTRL, l, resizeactive, -20 0
binde = $mod CTRL, Left, resizeactive, 20 0
binde = $mod CTRL, Down, resizeactive, 0 20
binde = $mod CTRL, Up, resizeactive, 0 -20
binde = $mod CTRL, Right, resizeactive, -20 0

# ── Workspaces ───────────────────────────────────────────────────
# Mirrors: bindsym $mod+1-0 workspace $ws1-$ws10
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

# Mirrors: bindsym $mod+Shift+1-0 move container to workspace
bind = $mod SHIFT, 1, movetoworkspacesilent, 1
bind = $mod SHIFT, 2, movetoworkspacesilent, 2
bind = $mod SHIFT, 3, movetoworkspacesilent, 3
bind = $mod SHIFT, 4, movetoworkspacesilent, 4
bind = $mod SHIFT, 5, movetoworkspacesilent, 5
bind = $mod SHIFT, 6, movetoworkspacesilent, 6
bind = $mod SHIFT, 7, movetoworkspacesilent, 7
bind = $mod SHIFT, 8, movetoworkspacesilent, 8
bind = $mod SHIFT, 9, movetoworkspacesilent, 9
bind = $mod SHIFT, 0, movetoworkspacesilent, 10

# ── Layout ───────────────────────────────────────────────────────
# Mirrors: bindsym $mod+f fullscreen toggle
bind = $mod, f, fullscreen, 1    # maximize (keeps tiling, stays when switching focus)
bind = $mod SHIFT, f, fullscreen, 0    # true fullscreen (covers bar, exclusive)
# Mirrors: bindsym $mod+Shift+space floating toggle
bind = $mod SHIFT, space, togglefloating
# Mirrors: bindsym $mod+space focus mode_toggle
bind = $mod, space, cyclenext    # focus between tiling/floating
# Toggle keyboard layout (us / us-intl) — Win+Space
bind = SUPER, space, exec, hyprctl switchxkblayout all next
# Mirrors: bindsym $mod+e layout toggle split
bind = $mod, e, togglesplit
# Mirrors: bindsym $mod+Shift+s sticky toggle
bind = $mod SHIFT, s, pin

# ── Scratchpad ───────────────────────────────────────────────────
# Mirrors: bindsym $mod+Shift+minus move scratchpad
bind = $mod SHIFT, minus, movetoworkspacesilent, special:scratchpad
# Mirrors: bindsym $mod+minus scratchpad show
bind = $mod, minus, togglespecialworkspace, scratchpad

# ── Session ──────────────────────────────────────────────────────
# Mirrors: bindsym $mod+Shift+c reload
bind = $mod SHIFT, c, exec, hyprctl reload
# Mirrors: bindsym $mod+Shift+e (exit) — now visual logout menu
bind = $mod SHIFT, e, exec, wlogout
# Mirrors: bindsym $mod+Shift+x exec --no-startup-id blurlock
bind = $mod SHIFT, x, exec, hyprlock
bind = $mod, x, exec, systemctl suspend

# ── Applications ─────────────────────────────────────────────────
# Mirrors: bindsym $mod+b exec --no-startup-id kitty -e yazi
bind = $mod, b, exec, kitty -e yazi
# Mirrors: bindsym $mod+c exec --no-startup-id kitty -e python3
bind = $mod, c, exec, kitty -e python3
# Mirrors: bindsym $mod+n exec --no-startup-id ~/.scripts/cycle-wallpaper.sh
bind = $mod, n, exec, ~/.scripts/cycle-wallpaper.sh $wallpaper_folder
# Mirrors: bindsym $mod+y exec --no-startup-id xclip linkedin
bind = $mod, y, exec, wl-copy < ~/.scripts/linkedin_response.md

# ── Screenshot ───────────────────────────────────────────────────
# Mirrors: bindsym Mod4+Shift+s screenshot selection
bind = SUPER SHIFT, s, exec, XDG_CURRENT_DESKTOP=sway flameshot gui
# Full screen screenshot
bind = , Print, exec, grim ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png
# Selection to file
bind = $mod, Print, exec, grim -g "$(slurp)" ~/Pictures/screenshot-$(date +%Y%m%d-%H%M%S).png

# ── Audio ────────────────────────────────────────────────────────
# Mirrors: XF86Audio keybinds
binde = , XF86AudioRaiseVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ +3%
binde = , XF86AudioLowerVolume, exec, pactl set-sink-volume @DEFAULT_SINK@ -3%
bind = , XF86AudioMute, exec, amixer -q sset Master toggle
bind = , XF86AudioPause, exec, playerctl --player=spotify play-pause
bind = , XF86AudioPlay, exec, playerctl --player=spotify play-pause
bind = , XF86AudioNext, exec, playerctl --player=spotify next
bind = , XF86AudioPrev, exec, playerctl --player=spotify previous

# ── Mouse ────────────────────────────────────────────────────────
# Mirrors: floating_modifier $mod
bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ── Bar toggle ───────────────────────────────────────────────────
# Mirrors: bindsym $mod+m bar mode toggle
bind = $mod, m, exec, pkill -SIGUSR1 waybar

# ── Notification center toggle ───────────────────────────────────
bind = $mod SHIFT, n, exec, swaync-client -t -sw

# ── Clipboard history ────────────────────────────────────────────
bind = $mod, v, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

# ── Color picker ─────────────────────────────────────────────────
bind = SUPER SHIFT, c, exec, hyprpicker -a

# ── Window groups (tabbed layout) ────────────────────────────────
bind = $mod, t, togglegroup
bind = $mod, Tab, changegroupactive, f

# ── Window rules ─────────────────────────────────────────────────
# Mirrors: for_window [class="..."] floating enable
windowrule = float true, match:class pavucontrol
windowrule = float true, match:class nemo
windowrule = float true, match:class Galculator
windowrule = float true, match:class Nitrogen
windowrule = float true, match:class Matplotlib
windowrule = float true, match:class easyeffects
windowrule = float true, match:title alsamixer
windowrule = float true, match:title File Transfer.*
windowrule = float true, match:class wlogout

# ── Opacity overrides ───────────────────────────────────────────
# Keep media/image apps fully opaque
windowrule = opacity 1.0 override, match:class firefox|google-chrome|brave-browser|chromium
windowrule = opacity 1.0 override, match:class mpv|vlc|Spotify
windowrule = opacity 1.0 override, match:class eog|feh|gimp
windowrule = opacity 1.0 override, match:fullscreen true


# ── Layer blur ───────────────────────────────────────────────────
# Blur behind rofi, waybar, notifications
layerrule = blur on, match:namespace rofi
layerrule = blur on, match:namespace waybar
layerrule = blur on, match:namespace notifications
layerrule = ignore_alpha 0, match:namespace rofi
layerrule = ignore_alpha 0, match:namespace waybar
layerrule = ignore_alpha 0, match:namespace notifications

# ══════════════════════════════════════════════════════════════════
#  AUTOSTART
# ══════════════════════════════════════════════════════════════════

# Wallpaper
exec-once = swaybg -i ~/Pictures/Wallpapers/GABRIEL-5890.jpg.jpeg -m fill
# Status bar
exec-once = waybar
# Notifications
exec-once = swaync
# Network manager applet
exec-once = nm-applet
# EasyEffects audio EQ
exec-once = easyeffects --gapplication-service
# RAM monitor
exec-once = ~/.local/bin/ram-monitor.sh
# Clipboard history daemon
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
# Flameshot screenshot daemon
exec-once = XDG_CURRENT_DESKTOP=sway flameshot
# Terminal on startup
exec-once = kitty
