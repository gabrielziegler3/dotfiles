# i3blocks config
# Requires: playerctl, pactl, lm-sensors, MesloLGS Nerd Font

separator_block_width=15
markup=pango

# Spotify / Media (scrolling text)
[mediaplayer]
command=~/.config/i3/scripts/spotify.sh
color=#c0caf5
interval=1
signal=10

# Volume
[volume]
command=echo "<span color='#bb9af7'></span> $(~/.config/i3/scripts/volume.sh)"
color=#c0caf5
interval=1
signal=10

# CPU Usage
[cpu]
command=echo "<span color='#f7768e'></span> $(~/.config/i3/scripts/cpu.sh)"
color=#c0caf5
interval=3

# Memory
[memory]
command=echo "<span color='#e0af68'></span> $(free -h | awk '/Mem:/{printf "%s/%s", $3, $2}')"
color=#c0caf5
interval=3

# CPU Temperature
[cpu_temp]
command=echo "<span color='#ff9e64'></span> $(sensors k10temp-pci-00c3 2>/dev/null | awk '/Tctl/{gsub(/\+/,"",$2); print $2}')"
color=#c0caf5
interval=5

# GPU (temp + power)
[gpu]
command=echo "<span color='#ff9e64'>󰢮</span> $(~/.config/i3/scripts/gpu.sh)"
color=#c0caf5
interval=5

# Disk Usage
[disk]
command=echo "<span color='#7dcfff'></span> $(df -h / | awk 'NR==2{printf "%s/%s", $3, $2}')"
color=#c0caf5
interval=30

# WiFi
[wifi]
command=ssid=$(nmcli -t -f active,ssid dev wifi 2>/dev/null | awk -F: '/^yes/{print $2}'); echo "<span color='#7aa2f7'></span> ${ssid:-disconnected}"
color=#c0caf5
interval=10

# Date & Time
[datetime]
command=echo "<span color='#73daca'></span> $(date '+%a %d %b %H:%M')"
color=#c0caf5
interval=60

