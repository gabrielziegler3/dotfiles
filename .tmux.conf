# ~/.tmux.conf

# -- General ------------------------------------------------------------------

set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.tmux/plugins/'
set-option -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",xterm-kitty:Tc"

# -- Navigation ----------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

bind-key -r -T prefix C-k resize-pane -U
bind-key -r -T prefix C-j resize-pane -D
bind-key -r -T prefix C-h resize-pane -L
bind-key -r -T prefix C-l resize-pane -R

# -- Vi mode -------------------------------------------------------------------

set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'xclip -in -selection clipboard'

# -- Status bar (Ayu theme) ----------------------------------------------------

set -g status-interval 30
set -g status-position bottom
set -g status-justify left
set -g status-left-length 40
set -g status-right-length 120

# Colors matching Ayu dark
set -g status-style "bg=#1a1e26,fg=#bfbab0"

# Left: session name + git branch
set -g status-left "#[fg=#1a1e26,bg=#ffcc66,bold]  #S #[fg=#ffcc66,bg=#1a1e26,nobold] #[fg=#bae67e]#(cd #{pane_current_path}; git rev-parse --abbrev-ref HEAD 2>/dev/null | sed 's/^/ /') "

# Right: pwd | battery | weather | date+time
set -g status-right "#[fg=#6c7380]#{b:pane_current_path} #[fg=#bae67e]#(~/.tmux/scripts/battery.sh)#[fg=#3ba5a1]#(~/.tmux/scripts/weather.sh) #[fg=#1a1e26,bg=#ffcc66,bold] %a %b %-d %H:%M "

# Window tabs
set -g window-status-format "#[fg=#6c7380]  #I #W  "
set -g window-status-current-format "#[fg=#0f1419,bg=#399ee6,bold]  #I #W  "
set -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#303030"
set -g pane-active-border-style "fg=#399ee6"

# Message style
set -g message-style "bg=#ffcc66,fg=#0f1419,bold"

# -- Plugins -------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'christoomey/vim-tmux-navigator'

# Disable vim-tmux-navigator's clear screen override (conflicts with C-l resize)
set -g @vim_navigator_prefix_mapping_clear_screen ''

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
